name: Update Custom Playlist

on:
  schedule:
    - cron: '0 3 * * *'   # setiap hari jam 03:00 UTC
  workflow_dispatch:      # bisa dijalankan manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Paksa pakai Node.js 24

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script
        run: python update_playlist.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my_channels.m3u
          git diff --staged --quiet || git commit -m "Update playlist"
          git push
